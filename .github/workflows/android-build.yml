name: Android Build

# Manual only — automatic runs on every push were failing and spamming
# GitHub notifications. Trigger from Actions → Android Build → Run workflow.
on:
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
