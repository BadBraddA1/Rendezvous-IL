name: RendezvousIL
options:
  bundleIdPrefix: com.rendezvousil
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 0.59.0
  Ably:
    url: https://github.com/ably/ably-cocoa
    from: 1.2.40
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  RendezvousIL:
    type: application
    platform: iOS
    sources:
      - path: RendezvousIL
      - path: Shared
    resources:
      - path: RendezvousIL/Resources/Assets.xcassets
      - path: RendezvousIL/Resources/schedule-fallback.json
    entitlements:
      path: RendezvousIL/RendezvousIL.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - webcredentials:clerk.rendezvousil.com
          - applinks:clerk.rendezvousil.com
          - webcredentials:rendezvousil.com
          - applinks:rendezvousil.com
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    capabilities:
      pushNotifications: true
    dependencies:
      - package: Clerk
        product: Clerk
      - package: Ably
        product: Ably
      - target: RendezvousILWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rendezvousil.braddcorp.app
        PRODUCT_NAME: Rendezvous IL
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "23"
        INFOPLIST_FILE: RendezvousIL/Info.plist
        CODE_SIGN_ENTITLEMENTS: RendezvousIL/RendezvousIL.entitlements

  RendezvousILWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: RendezvousILWidgets
    entitlements:
      path: RendezvousILWidgets/RendezvousILWidgets.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rendezvousil.braddcorp.app.widgets
        PRODUCT_NAME: RendezvousILWidgets
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "23"
        INFOPLIST_KEY_CFBundleDisplayName: Rendezvous Widgets
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: RendezvousILWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: RendezvousILWidgets/RendezvousILWidgets.entitlements
        SKIP_INSTALL: YES
schemes:
  RendezvousIL:
    build:
      targets:
        RendezvousIL: all
        RendezvousILWidgets: all
    run:
      config: Debug
    archive:
      config: Release
